<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Extra 2 - Несколько источников</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; margin-bottom: 20px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error { color: red; padding: 10px; background: #ffe6e6; }
    .source { background: white; padding: 15px; margin: 10px 0; border-left: 4px solid #3498db; }
  </style>
</head>
<body>
  <h2>Extra 2: Несколько асинхронных источников</h2>
  <button id="loadBtn">Загрузить всё</button>
  <div id="container"></div>
  <script src="task.js"></script>
</body>
</html>
